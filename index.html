<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criador de GIF Profissional</title>
    <!-- Importação da biblioteca principal -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 26px;
        }
        .subtitulo {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .aviso {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .area-upload {
            border: 3px dashed #1e3c72;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 25px;
        }
        .area-upload:hover {
            background-color: #f8f9ff;
            border-color: #2a5298;
        }
        .area-upload svg {
            width: 60px;
            height: 60px;
            fill: #1e3c72;
            margin-bottom: 15px;
        }
        input[type="file"] {
            display: none;
        }
        .btn-selecionar {
            background: #1e3c72;
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            display: inline-block;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .preview-fotos {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
        }
        .foto-mini {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #ddd;
        }
        .configuracao {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        .linha-config {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .linha-config label {
            color: #333;
            font-weight: 500;
        }
        input[type="range"] {
            width: 60%;
        }
        .valor-velocidade {
            background: #1e3c72;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            min-width: 80px;
            text-align: center;
            font-weight: bold;
        }
        .btn-criar {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #28a745, #20c997);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-criar:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .progresso-container {
            width: 100%;
            height: 25px;
            background-color: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
            margin: 15px auto;
            display: none;
        }
        .barra-progresso {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            text-align: center;
            line-height: 25px;
            color: white;
            font-weight: bold;
            transition: width 0.1s linear;
        }
        .texto-progresso {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
            color: #1e3c72;
            display: none;
        }
        .area-resultado {
            text-align: center;
            margin-top: 25px;
            display: none;
        }
        #gifFinal {
            max-width: 100%;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-baixar {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 30px;
            background: #ffc107;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
        .espaco-anuncio {
            width: 100%;
            height: 90px;
            background-color: #e9ecef;
            border: 1px solid #ccc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ESPAÇO PARA PUBLICIDADE - TOPO -->
        <div class="espaco-anuncio">
            Espaço para Anúncio - Topo
        </div>

        <h1>🖼️ Criador de GIF</h1>
        <p class="subtitulo">Transforme suas fotos em uma animação incrível!</p>

        <div class="aviso">
            ⚠️ Dica: Use fotos de tamanho similar para um melhor resultado.
        </div>

        <div class="area-upload" id="areaDrop" onclick="document.getElementById('arquivos').click()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9-2 2-2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
            <p>Arraste fotos ou clique no botão abaixo</p>
            <label for="arquivos" class="btn-selecionar" onclick="event.stopPropagation()">Selecionar Fotos</label>
            <input type="file" id="arquivos" accept="image/*" multiple>
        </div>

        <div class="preview-fotos" id="preview"></div>
        <div class="linha-config">
    <label>🖼️ Ajustar fotos (esticar):</label>
    <input type="checkbox" id="ajustarFotos" checked>
</div>
        <div class="configuracao">
            <div class="linha-config">
                <label>⏱️ Intervalo entre fotos:</label>
                <div class="valor-velocidade" id="mostrarVelocidade">0.5s</div>
            </div>
            <input type="range" id="velocidade" min="100" max="2000" value="500">
        </div>

        <button class="btn-criar" id="btnCriar" disabled>🎬 Criar Meu GIF Agora</button>

        <div class="texto-progresso" id="textoProgresso">Iniciando...</div>
        <div class="progresso-container" id="containerProgresso">
            <div class="barra-progresso" id="barraProgresso">0%</div>
        </div>

        <div class="area-resultado" id="resultado">
            <h3>✅ Seu GIF está pronto!</h3>
            <img id="gifFinal" src="" alt="GIF">
            <a href="#" id="btnBaixar" class="btn-baixar" download="meu-gif.gif">📥 BAIXAR GIF</a>
        </div>

        <!-- ESPAÇO PARA PUBLICIDADE - RODAPÉ -->
        <div class="espaco-anuncio">
            Espaço para Anúncio - Rodapé
        </div>

    </div>

    <script>
        let imagensProntas = [];
        const input = document.getElementById('arquivos');
        const preview = document.getElementById('preview');
        const btnCriar = document.getElementById('btnCriar');
        const rangeVelocidade = document.getElementById('velocidade');
        const txtVelocidade = document.getElementById('mostrarVelocidade');
        
        const bProgresso = document.getElementById('barraProgresso');
        const tProgresso = document.getElementById('textoProgresso');
        const cProgresso = document.getElementById('containerProgresso');
        const resDiv = document.getElementById('resultado');

        // Atualiza o texto da velocidade no slider
        rangeVelocidade.oninput = function() {
            txtVelocidade.innerText = (this.value / 1000).toFixed(1) + 's';
        };

        // Carregar as imagens e gerar preview
        input.onchange = function(e) {
            const files = Array.from(e.target.files);
            if (!files.length) return;

            imagensProntas = [];
            preview.innerHTML = '';
            btnCriar.disabled = true;

            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        imagensProntas.push(img);
                        const mini = document.createElement('img');
                        mini.src = img.src;
                        mini.className = 'foto-mini';
                        preview.appendChild(mini);
                        
                        if (imagensProntas.length >= 2) btnCriar.disabled = false;
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        // Lógica Principal de Criação


btnCriar.onclick = function() {
    resDiv.style.display = 'none';
    cProgresso.style.display = 'block';
    tProgresso.style.display = 'block';
    btnCriar.disabled = true;

    const ajustar = document.getElementById('ajustarFotos').checked;
    
    // Definimos o tamanho padrão baseado na primeira imagem se o ajuste estiver ligado
    const larguraPadrao = imagensProntas[0].width;
    const alturaPadrao = imagensProntas[0].height;

    const workerBlob = new Blob([
        'importScripts("https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js");'
    ], { type: 'application/javascript' });

    const gif = new GIF({
        workers: 2,
        quality: 10,
        width: ajustar ? larguraPadrao : null,
        height: ajustar ? alturaPadrao : null,
        workerScript: URL.createObjectURL(workerBlob)
    });

    const delayValue = parseInt(rangeVelocidade.value);

    imagensProntas.forEach(img => {
        if (ajustar) {
            // Cria um canvas temporário para redimensionar/esticar a imagem
            const canvas = document.createElement('canvas');
            canvas.width = larguraPadrao;
            canvas.height = alturaPadrao;
            const ctx = canvas.getContext('2d');
            // O drawImage com 5 argumentos faz o "stretch" (esticar) para o tamanho do canvas
            ctx.drawImage(img, 0, 0, larguraPadrao, alturaPadrao);
            gif.addFrame(canvas, {delay: delayValue, copy: true});
        } else {
            gif.addFrame(img, {delay: delayValue, copy: true});
        }
    });

    gif.on('progress', function(p) {
        const pct = Math.round(p * 100);
        bProgresso.style.width = pct + '%';
        bProgresso.innerText = pct + '%';
        tProgresso.innerText = "Renderizando animação: " + pct + "%";
    });

    gif.on('finished', function(blob) {
        const url = URL.createObjectURL(blob);
        document.getElementById('gifFinal').src = url;
        document.getElementById('btnBaixar').href = url;
        
        cProgresso.style.display = 'none';
        tProgresso.style.display = 'none';
        resDiv.style.display = 'block';
        btnCriar.disabled = false;
    });

    gif.render();
};          
    </script>
</body>
</html>
